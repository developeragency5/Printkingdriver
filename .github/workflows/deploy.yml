name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare site (clean URLs + .nojekyll)
        run: |
          cd artifacts/printkingdriver/public
          touch .nojekyll
          node -e "
          const fs = require('fs');
          const path = require('path');
          function walk(dir) {
            for (const entry of fs.readdirSync(dir, { withFileTypes: true })) {
              const full = path.join(dir, entry.name);
              if (entry.isDirectory()) { walk(full); continue; }
              if (!entry.name.endsWith('.html')) continue;
              const base = entry.name.replace(/\.html\$/, '');
              if (base === 'index' || base === '404') continue;
              const folder = path.join(dir, base);
              if (fs.existsSync(folder) && fs.statSync(folder).isDirectory()) continue;
              fs.mkdirSync(folder, { recursive: true });
              fs.copyFileSync(full, path.join(folder, 'index.html'));
            }
          }
          walk('.');
          console.log('Generated clean-URL folders.');
          "

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: artifacts/printkingdriver/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
