name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare site (rewrite paths + clean URLs + .nojekyll)
        env:
          REPO_NAME: ${{ github.event.repository.name }}
          HAS_CUSTOM_DOMAIN: ${{ vars.HAS_CUSTOM_DOMAIN }}
        run: |
          cd artifacts/printkingdriver/public
          touch .nojekyll
          node -e "
          const fs = require('fs');
          const path = require('path');
          const repo = process.env.REPO_NAME || '';
          const useBase = !process.env.HAS_CUSTOM_DOMAIN && repo;
          const base = useBase ? '/' + repo : '';
          console.log('Base path:', base || '(root)');
          function rewritePaths(content) {
            if (!base) return content;
            content = content.replace(/(\\b(?:href|src|action|poster|content|data-src)=[\"'])\\/(?!\\/)/g, '\$1' + base + '/');
            content = content.replace(/\\burl\\((['\"]?)\\/(?!\\/)/g, 'url(\$1' + base + '/');
            return content;
          }
          function walk(dir, fn) {
            for (const entry of fs.readdirSync(dir, { withFileTypes: true })) {
              const full = path.join(dir, entry.name);
              if (entry.isDirectory()) walk(full, fn);
              else fn(full, entry.name);
            }
          }
          walk('.', (full, name) => {
            if (name.endsWith('.html') || name.endsWith('.css') || name.endsWith('.js')) {
              const before = fs.readFileSync(full, 'utf8');
              const after = rewritePaths(before);
              if (after !== before) fs.writeFileSync(full, after);
            }
          });
          walk('.', (full, name) => {
            if (!name.endsWith('.html')) return;
            const b = name.replace(/\\.html\$/, '');
            if (b === 'index' || b === '404') return;
            const folder = path.join(path.dirname(full), b);
            if (fs.existsSync(folder) && fs.statSync(folder).isDirectory()) return;
            fs.mkdirSync(folder, { recursive: true });
            fs.copyFileSync(full, path.join(folder, 'index.html'));
          });
          console.log('Site prepared.');
          "

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: artifacts/printkingdriver/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
