kind = "web"
previewPath = "/"
title = "PrintKingDriver.com"
version = "1.0.0"
id = "artifacts/printkingdriver"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26034

[services.development]
run = "pnpm --filter @workspace/printkingdriver run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/printkingdriver", "run", "build" ]
publicDir = "artifacts/printkingdriver/dist/public"
serve = "static"
notFoundPage = "/404.html"

[services.env]
PORT = "26034"
